server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index /src/index.html;

  location = /healthz {
    access_log off;
    return 204;
  }

  location = / {
    try_files /src/index.html =404;
  }

  location = /app.js {
    try_files /src/app.js =404;
  }

  location = /styles.css {
    try_files /src/styles.css =404;
  }

  location /src/ {
    try_files $uri =404;
  }

  location /assets/data/ {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location /assets/ {
    try_files $uri =404;
  }
}
